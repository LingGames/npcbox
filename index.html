<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LingGames NPC Sandbox</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <aside class="hud">
        <div class="panel">
          <p class="eyebrow">LingGames</p>
          <h1>Minimal NPC Sandbox</h1>
          <p class="intro">
            Prueba minima con un player manejable y un solo NPC.
          </p>
        </div>

        <div class="panel">
          <h2>Controles</h2>
          <ul>
            <li>Muevete con <code>W A S D</code>.</li>
            <li>Acercate al NPC para probar la deteccion.</li>
          </ul>
        </div>

        <div class="panel">
          <h2>Estado</h2>
          <div class="metric"><span>Player</span><strong id="player-state"></strong></div>
          <div class="reaction">
            <strong>NPC</strong>
            <span id="npc-state"></span>
          </div>
        </div>
      </aside>
      <main id="scene-root"></main>
    </div>
  </body>
  </html>
